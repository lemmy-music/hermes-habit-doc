name: habit_doc
description: Flexible habit & event tracking app with custom widgets and correlations.
publish_to: 'none'

version: 1.0.1+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter

  # State Management
  provider: ^6.0.0
  
  # Database – web-safe via drift_flutter (no dart:ffi on web)
  drift: ^2.14.0
  drift_flutter: ^0.2.0
  path_provider: ^2.1.0
  path: ^1.8.0
  
  # Charts & Visualization
  fl_chart: ^0.68.0
  
  # UI
  intl: ^0.19.0

  # Phase 2 – Darkmode, Export, Import
  shared_preferences: ^2.3.0
  file_picker: ^8.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  drift_dev: ^2.14.0
  build_runner: ^2.4.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/


